<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sprite Map Viewer — MegaMan is Dead</title>
<style>
  body { background: #0b0e14; color: #cfd8e3; font: 12px monospace; margin: 20px; }
  h1 { font-size: 14px; color: #7ec8ff; }
  h2 { font-size: 12px; color: #ffe08a; margin-top: 28px; }
  p { color: #6b7a8c; max-width: 70ch; }
  .grid { display: flex; flex-wrap: wrap; gap: 14px; }
  .cell { background: #131824; border: 1px solid #232c3e; padding: 8px; text-align: center; }
  .cell canvas { image-rendering: pixelated; background: #05070c; display: block; margin: 0 auto 6px; }
  .cell span { color: #ffe08a; }
  .cell small { color: #56677c; display: block; }
</style>
</head>
<body>
<h1>Sprite map viewer</h1>
<p>Every animation for every character, played live from the auto-sliced sheets.
If one looks wrong, edit that entry's [row, index] list in <b>js/spritemap.js</b> (X)
or <b>js/rushmap.js</b> (Rush) — rows and indices count top-to-bottom, left-to-right
on the sheet. Refresh to see the fix.</p>
<div id="root"></div>
<script type="module">
import { loadSheet } from '../js/assets.js';
import { sliceSheet } from '../js/slicer.js';
import { X_MAP, Animator } from '../js/spritemap.js';
import { RUSH_MAP } from '../js/rushmap.js';
import { BUSTER_MAP } from '../js/bustermap.js';
import { MISC_MAP } from '../js/miscmap.js';
import { CFG } from '../js/config.js';

const CHARS = [
  { name: 'X', sheet: CFG.chars.x.sheet, map: X_MAP },
  { name: 'RUSH', sheet: CFG.chars.rush.sheet, map: RUSH_MAP },
  { name: 'X BUSTER SHOTS', sheet: CFG.buster.sheet, map: BUSTER_MAP },
  { name: 'MISC EFFECTS', sheet: CFG.effects.sheet, map: MISC_MAP },
];
const root = document.getElementById('root');
const cells = [];

for (const c of CHARS) {
  const sheet = await loadSheet('../' + c.sheet);
  const rows = sliceSheet(sheet);
  const h2 = document.createElement('h2');
  h2.textContent = c.name + ' — ' + c.sheet;
  const grid = document.createElement('div');
  grid.className = 'grid';
  root.append(h2, grid);
  for (const name of Object.keys(c.map)) {
    const div = document.createElement('div');
    div.className = 'cell';
    const cv = document.createElement('canvas');
    cv.width = 80; cv.height = 80; cv.style.width = '160px'; cv.style.height = '160px';
    const label = document.createElement('span'); label.textContent = name;
    const info = document.createElement('small');
    info.textContent = c.map[name].frames
      .map(f => Array.isArray(f) ? f.join(':') : `${f.x},${f.y}`).join(' ');
    div.append(cv, label, info);
    grid.append(div);
    const a = new Animator(sheet, rows, c.map);
    a.set(name, true);
    const g = cv.getContext('2d');
    g.imageSmoothingEnabled = false;
    cells.push({ a, g, name });
  }
}

function loop() {
  for (const c of cells) {
    c.a.tick();
    if (c.a.finished) c.a.set(c.name, true);
    c.g.clearRect(0, 0, 80, 80);
    c.a.draw(c.g, 40, 72, 1);
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
