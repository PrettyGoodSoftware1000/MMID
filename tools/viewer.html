<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sprite Map Viewer — MegaMan is Dead</title>
<style>
  body { background: #0b0e14; color: #cfd8e3; font: 12px monospace; margin: 20px; }
  h1 { font-size: 14px; color: #7ec8ff; }
  p { color: #6b7a8c; max-width: 70ch; }
  .grid { display: flex; flex-wrap: wrap; gap: 14px; }
  .cell { background: #131824; border: 1px solid #232c3e; padding: 8px; text-align: center; }
  .cell canvas { image-rendering: pixelated; background: #05070c; display: block; margin: 0 auto 6px; }
  .cell span { color: #ffe08a; }
  .cell small { color: #56677c; display: block; }
</style>
</head>
<body>
<h1>Sprite map viewer</h1>
<p>Every animation defined in <b>js/spritemap.js</b>, played live from the auto-sliced sheet.
If one looks wrong, edit that entry's [row, index] list — rows and indices are counted
top-to-bottom, left-to-right on the sheet. Refresh to see the fix.</p>
<div class="grid" id="grid"></div>
<script type="module">
import { loadSheet } from '../js/assets.js';
import { sliceSheet } from '../js/slicer.js';
import { X_MAP, Animator } from '../js/spritemap.js';

const sheet = await loadSheet('../assets/x.png');
const rows = sliceSheet(sheet);
const grid = document.getElementById('grid');
const cells = [];

for (const name of Object.keys(X_MAP)) {
  const div = document.createElement('div');
  div.className = 'cell';
  const c = document.createElement('canvas');
  c.width = 72; c.height = 72; c.style.width = '144px'; c.style.height = '144px';
  const label = document.createElement('span'); label.textContent = name;
  const info = document.createElement('small');
  info.textContent = X_MAP[name].frames.map(f => f.join(':')).join(' ');
  div.append(c, label, info);
  grid.append(div);
  const a = new Animator(sheet, rows, X_MAP);
  a.set(name, true);
  cells.push({ a, g: c.getContext('2d'), name });
}
cells.forEach(c => c.g.imageSmoothingEnabled = false);

function loop() {
  for (const c of cells) {
    c.a.tick();
    if (c.a.finished) c.a.set(c.name, true); // restart one-shots
    c.g.clearRect(0, 0, 72, 72);
    c.a.draw(c.g, 36, 64, 1);
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
